version: '3.8'

services:
  # Backend Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: firenotes-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/firenotes.db
      - ENVIRONMENT=production
    networks:
      - firenotes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - production
      - default

  # Frontend Next.js Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: firenotes-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - firenotes-network
    restart: unless-stopped
    profiles:
      - production
      - default

  # Development Database Viewer (e.g. SQLite Web) - Only in 'dev' profile
  db-viewer:
    image: coleifer/sqlite-web
    container_name: firenotes-db-viewer
    ports:
      - "8080:8080"
    volumes:
      - backend_data:/data
    environment:
      - SQLITE_DATABASE=firenotes.db
    command: /data/firenotes.db -p 8080 -H 0.0.0.0
    networks:
      - firenotes-network
    profiles:
      - dev

networks:
  firenotes-network:
    driver: bridge

volumes:
  backend_data:
