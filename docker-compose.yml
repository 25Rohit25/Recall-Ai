version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/firenotes.db:/app/firenotes.db
    environment:
      - ENV=production
    restart: unless-stopped
    networks:
      - firenotes-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - firenotes-network

networks:
  firenotes-network:
    driver: bridge
